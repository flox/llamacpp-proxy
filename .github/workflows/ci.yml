name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78.0
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/validate.sh
